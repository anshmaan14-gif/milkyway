<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Park Entry</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0d1117;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouseX = 0;
let mouseY = 0;
let zoom = 1;

// Load car image
const car = new Image();
car.src = "car.png"; // 👈 replace with your image

// Track mouse / touch
window.addEventListener("mousemove", (e) => {
  mouseX = e.clientX / window.innerWidth - 0.5;
  mouseY = e.clientY / window.innerHeight - 0.5;
});

window.addEventListener("touchmove", (e) => {
  mouseX = e.touches[0].clientX / window.innerWidth - 0.5;
  mouseY = e.touches[0].clientY / window.innerHeight - 0.5;
});

// Animation loop
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Smooth zoom-in (walking forward effect)
  zoom += 0.002;
  if (zoom > 2) zoom = 2;

  // Background (park path illusion)
  let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, "#1a2a2a");
  gradient.addColorStop(1, "#0d1117");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw "gate"
  ctx.fillStyle = "#333";
  ctx.fillRect(canvas.width/2 - 100 * zoom, 100, 200 * zoom, 200 * zoom);

  ctx.fillStyle = "#555";
  ctx.fillRect(canvas.width/2 - 200 * zoom, 100, 20 * zoom, 250 * zoom);
  ctx.fillRect(canvas.width/2 + 180 * zoom, 100, 20 * zoom, 250 * zoom);

  // Camera movement (mouse control)
  let camX = mouseX * 100;
  let camY = mouseY * 50;

  // Draw ground (path)
  ctx.fillStyle = "#2e3d2f";
  ctx.fillRect(0, canvas.height/2 + camY, canvas.width, canvas.height);

  // Draw car (left side)
  ctx.drawImage(
    car,
    50 + camX,
    canvas.height/2 + 50 + camY,
    300 * zoom,
    150 * zoom
  );

  // Fake "person shadow" (player POV)
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height - 50, 40, 0, Math.PI * 2);
  ctx.fill();

  requestAnimationFrame(animate);
}

animate();

// Resize fix
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
